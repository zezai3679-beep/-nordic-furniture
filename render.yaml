services:
  - type: web
    name: nordic-furniture
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Nordic Furniture
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: BITABLE_APP_TOKEN
        sync: false
      - key: BITABLE_LEADS_TABLE_ID
        sync: false
